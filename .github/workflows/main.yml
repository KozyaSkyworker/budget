name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]

strategy:
  matrix:
    node-version: ['20.0.0']

jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
     - run: echo "hi there"
     - uses: actions/checkout@v6
     - name: Use Node.js
       uses: actions/setup-node@v4
       with:
         node-version: '20.x'
     - name: Install dependencies
       run: npm ci

     - run: npx eslint src
